<!DOCTYPE html>
<html>

<head>
  <title>ClientFlow Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">ClientFlow</div>

      <nav class="nav">
        <a href="#" class="active">Dashboard</a>
        <a href="#" id="adminMenu">Admin Panel</a>
      </nav>

      <button id="logoutBtn" class="btn danger full">Logout</button>
    </aside>

    <!-- Main -->
    <main class="main">

      <header class="topbar">
        <h1>Dashboard</h1>
      </header>

      <!-- Admin Section -->
      <section id="adminSection">
        <div class="card">
          <h2>Create Project</h2>

          <form id="createProjectForm">
            <input type="text" id="title" placeholder="Project Title" required>
            <input type="text" id="description" placeholder="Description" required>
            <select id="assignedTo" required></select>
            <button type="submit" class="btn primary">Create Project</button>
          </form>

          <p id="createMessage"></p>
        </div>
      </section>

      <!-- Stats -->
      <div class="stats">
        <div class="stat-c1ard" id="totalProjects"></div>
        <div class="stat-card" id="completedProjects"></div>
        <div class="stat-card" id="pendingProjects"></div>
      </div>

      <!-- Projects -->
      <section>
        <h2>Your Projects</h2>
        <div id="projects" class="project-grid"></div>
      </section>

    </main>

  </div>

  <script src="js/dashboard.js"></script>
</body>

</html>
